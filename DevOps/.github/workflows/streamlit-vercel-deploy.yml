name: Streamlit to Vercel Deployment

on:
  push:
    branches:
      - main
      - staging
    paths:
      - streamlit_app.py
      - api/**
      - frontend/**
      - requirements.txt
      - .github/workflows/streamlit-vercel-deploy.yml

env:
  NODE_VERSION: "18"
  PYTHON_VERSION: "3.11"

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f "api/requirements.txt" ]; then
            pip install -r api/requirements.txt
          fi

      - name: Validate Python syntax
        run: |
          python -m compileall -q streamlit_app.py
          if [ -f "api/index.py" ]; then
            python -m compileall -q api/index.py
          fi

      - name: Check Vercel secrets
        id: check_vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_SCOPE" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Vercel deployment enabled"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets missing; skipping Vercel deploy"
          fi

      - name: Set up Node.js
        if: steps.check_vercel.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        if: steps.check_vercel.outputs.enabled == 'true'
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        if: steps.check_vercel.outputs.enabled == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            vercel deploy --prod --token "$VERCEL_TOKEN" --scope "$VERCEL_SCOPE"
          else
            vercel deploy --token "$VERCEL_TOKEN" --scope "$VERCEL_SCOPE"
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "Workflow completed"
          echo "Branch: ${{ github.ref_name }}"
          echo "Vercel enabled: ${{ steps.check_vercel.outputs.enabled }}"
