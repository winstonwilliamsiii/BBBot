[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"
# Note: maxUploadSize moved to [server] per Streamlit config

[server]
headless = true
enableXsrfProtection = true
enableCORS = true
port = 8501
maxUploadSize = 200

[logger]
level = "info"

# Mapbox token config deprecated; use MAPBOX_API_KEY env var or pydeck api_keys
