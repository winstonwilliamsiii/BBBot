name: Migrate Database - Staging Environment

on:
  push:
    branches:
      - staging
    paths:
      - 'migrations/base/**'
      - 'migrations/staging/**'
      - '.github/workflows/migrate-staging.yml'

jobs:
  migrate-staging:
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
      
      - name: Run database migrations (Staging)
        env:
          DB_STAGING_HOST: ${{ secrets.DB_STAGING_HOST }}
          DB_STAGING_PORT: ${{ secrets.DB_STAGING_PORT }}
          DB_STAGING_USER: ${{ secrets.DB_STAGING_USER }}
          DB_STAGING_PASSWORD: ${{ secrets.DB_STAGING_PASSWORD }}
        run: |
          python scripts/migration_manager.py \
            --env staging \
            --action execute \
            --migration-dir migrations
      
      - name: Verify migration success
        env:
          DB_STAGING_HOST: ${{ secrets.DB_STAGING_HOST }}
          DB_STAGING_PORT: ${{ secrets.DB_STAGING_PORT }}
          DB_STAGING_USER: ${{ secrets.DB_STAGING_USER }}
          DB_STAGING_PASSWORD: ${{ secrets.DB_STAGING_PASSWORD }}
        run: |
          python scripts/migration_manager.py \
            --env staging \
            --action status
      
      - name: Run integration tests
        env:
          DB_STAGING_HOST: ${{ secrets.DB_STAGING_HOST }}
          DB_STAGING_PORT: ${{ secrets.DB_STAGING_PORT }}
          DB_STAGING_USER: ${{ secrets.DB_STAGING_USER }}
          DB_STAGING_PASSWORD: ${{ secrets.DB_STAGING_PASSWORD }}
        run: |
          python -m pytest tests/integration/ -v
      
      - name: Trigger Appwrite Function for Gmail Alert (Success)
        if: success()
        run: |
          curl -X POST ${{ secrets.APPWRITE_FUNCTION_URL }}/staging-alert \
            -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
            -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "staging_migration_complete",
              "status": "success",
              "branch": "staging",
              "commit": "${{ github.sha }}",
              "message": "🧠 Deep Learning 2-Week Training Phase Initiated",
              "recipient": "wwilliams@mansacap.com",
              "phase": "ml_training"
            }'
      
      - name: Trigger Appwrite Function for Gmail Alert (Failure)
        if: failure()
        run: |
          curl -X POST ${{ secrets.APPWRITE_FUNCTION_URL }}/staging-alert \
            -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
            -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "staging_migration_failed",
              "status": "failure",
              "branch": "staging",
              "commit": "${{ github.sha }}",
              "message": "❌ Staging Migration Failed - ML Training Delayed",
              "recipient": "wwilliams@mansacap.com"
            }'
