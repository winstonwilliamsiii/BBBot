
<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
</head>
<body>
    <button id="link-button" onclick="openPlaid()">Connect Bank</button>
    <div id="status"></div>
    
    <script>
        console.log('Initializing Plaid with token:', 'link-sandbox-ff84a31f-3df9-47e0-8882-3e9a8e655ea6'.substring(0, 30) + '...');
        
        var linkHandler = Plaid.create({
            token: 'link-sandbox-ff84a31f-3df9-47e0-8882-3e9a8e655ea6',
            onSuccess: function(public_token, metadata) {
                console.log('SUCCESS!', public_token);
                document.getElementById('status').textContent = 'Connected to ' + metadata.institution.name;
            },
            onExit: function(err, metadata) {
                if (err) console.error('ERROR:', err);
            },
            onLoad: function() {
                console.log('Plaid Link loaded!');
                document.getElementById('link-button').disabled = false;
            }
        });
        
        function openPlaid() {
            linkHandler.open();
        }
    </script>
</body>
</html>
