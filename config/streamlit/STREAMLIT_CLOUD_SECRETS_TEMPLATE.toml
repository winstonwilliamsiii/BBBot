# ================================================================
# STREAMLIT CLOUD SECRETS CONFIGURATION TEMPLATE
# ================================================================
# 
# CRITICAL: Copy this content to Streamlit Cloud:
# 1. Go to your app dashboard at https://share.streamlit.io/
# 2. Click on your app → Settings (⚙️) → Secrets
# 3. Paste this entire template
# 4. Replace all placeholder values with your actual credentials
# 5. Click "Save"
#
# SECURITY: These secrets are encrypted in Streamlit Cloud
# DO NOT commit actual credentials to git
# ================================================================

# ================================================================
# MYSQL DATABASE CONNECTION (REQUIRED)
# ================================================================
# Fix for: (pymysql.err.OperationalError) (1049, "Unknown database 'bbbot1'")
# 
# INSTRUCTIONS:
# - Update MYSQL_DATABASE to match your production database name
# - Get host/credentials from your Railway/PlanetScale dashboard
# - Common database names: railway, mansa_bot, bbbot1, mydb
# ================================================================

[mysql]
MYSQL_HOST = "your-mysql-host.railway.app"
MYSQL_PORT = "3306"
MYSQL_USER = "root"
MYSQL_PASSWORD = "your-mysql-password-here"
MYSQL_DATABASE = "railway"  # ⚠️ CHANGE THIS to match your actual database name

# Legacy compatibility (if your code uses these)
[database]
MYSQL_HOST = "your-mysql-host.railway.app"
MYSQL_USER = "root"
MYSQL_PASSWORD = "your-mysql-password-here"
MYSQL_DATABASE = "railway"  # ⚠️ CHANGE THIS to match your actual database name

# ================================================================
# ALPACA TRADING API (REQUIRED FOR BROKER TRADING)
# ================================================================
# Fix for: ❌ Alpaca credentials not configured
#
# INSTRUCTIONS:
# 1. Log in to https://alpaca.markets/
# 2. Go to Paper Trading → Generate API Keys
# 3. Copy your API Key and Secret Key
# 4. Replace the placeholder values below
# ================================================================

[alpaca]
ALPACA_PAPER = "true"  # Use "true" for paper trading, "false" for live
ALPACA_PAPER_API_KEY = "your-paper-api-key-here"
ALPACA_PAPER_SECRET_KEY = "your-paper-secret-key-here"
ALPACA_LIVE_API_KEY = "your-live-api-key-here"
ALPACA_LIVE_SECRET_KEY = "your-live-secret-key-here"
ALPACA_API_KEY = "optional-legacy-fallback-key"
ALPACA_SECRET_KEY = "optional-legacy-fallback-secret"

[axi]
AXI_MT5_USER = "your-axi-account-number"
AXI_MT5_PASSWORD = "your-axi-password"
AXI_MT5_SERVER = "Axi-US51-Live"  # live example; demo can use mt5-demo07.axi.com
AXI_MT5_PORT = "443"
AXI_MT5_API_URL = "http://localhost:8002"

# ================================================================
# PLAID BANK LINKING (REQUIRED FOR BANK CONNECTIONS)
# ================================================================
# Fix for: Plaid Link does not complete initializing
#
# INSTRUCTIONS:
# 1. Log in to https://dashboard.plaid.com/
# 2. Go to Team Settings → Keys
# 3. Copy client_id and sandbox secret
# 4. For production, use development or production keys
# 5. Update redirect URIs in Plaid dashboard to match your Streamlit URL
# ================================================================

[plaid]
PLAID_CLIENT_ID = "your-plaid-client-id"
PLAID_SECRET = "your-plaid-sandbox-secret"
PLAID_ENV = "sandbox"  # Options: sandbox, development, production
PLAID_ITEMS_COLLECTION_ID = "plaid_items"

# ================================================================
# APPWRITE (OPTIONAL - Backend Services)
# ================================================================
[appwrite]
APPWRITE_ENDPOINT = "https://cloud.appwrite.io/v1"
APPWRITE_PROJECT_ID = "your-project-id"
APPWRITE_API_KEY = "your-api-key"
APPWRITE_DATABASE_ID = "your-database-id"

# ================================================================
# MLFLOW (OPTIONAL - ML Tracking)
# ================================================================
[mlflow]
MLFLOW_TRACKING_URI = "https://your-mlflow-server.railway.app"
MLFLOW_TRACKING_USERNAME = "admin"
MLFLOW_TRACKING_PASSWORD = "your-password"

# ================================================================
# MARKET DATA APIS (OPTIONAL)
# ================================================================
[tiingo]
TIINGO_API_KEY = "your-tiingo-api-key"

[alpha_vantage]
ALPHA_VANTAGE_API_KEY = "your-alpha-vantage-key"

[yahoo]
YFINANCE_AVAILABLE = true

# ================================================================
# CAPITAL ONE DEVEXCHANGE (OPTIONAL)
# ================================================================
[capital_one]
CAPITAL_ONE_HOST = "https://api-sandbox.capitalone.com"
CAPITAL_ONE_CLIENT_ID = "your-client-id"
CAPITAL_ONE_CLIENT_SECRET = "your-client-secret"

# ================================================================
# PRODUCTION FLAGS
# ================================================================
[environment]
ENVIRONMENT = "production"
DEBUG = "false"
