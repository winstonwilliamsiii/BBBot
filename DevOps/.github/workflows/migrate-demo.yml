name: Migrate Database - Demo Environment

on:
  push:
    branches:
      - dev
    paths:
      - 'migrations/base/**'
      - 'migrations/demo/**'
      - '.github/workflows/migrate-demo.yml'

jobs:
  migrate-demo:
    runs-on: ubuntu-latest
    environment: demo
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
      
      - name: Run database migrations (Demo)
        env:
          DB_DEMO_HOST: ${{ secrets.DB_DEMO_HOST }}
          DB_DEMO_PORT: ${{ secrets.DB_DEMO_PORT }}
          DB_DEMO_USER: ${{ secrets.DB_DEMO_USER }}
          DB_DEMO_PASSWORD: ${{ secrets.DB_DEMO_PASSWORD }}
        run: |
          python scripts/migration_manager.py \
            --env demo \
            --action execute \
            --migration-dir migrations
      
      - name: Verify migration success
        env:
          DB_DEMO_HOST: ${{ secrets.DB_DEMO_HOST }}
          DB_DEMO_PORT: ${{ secrets.DB_DEMO_PORT }}
          DB_DEMO_USER: ${{ secrets.DB_DEMO_USER }}
          DB_DEMO_PASSWORD: ${{ secrets.DB_DEMO_PASSWORD }}
        run: |
          python scripts/migration_manager.py \
            --env demo \
            --action status
      
      - name: Log Demo Migration Status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Demo migration successful - No alerts (local testing)"
          else
            echo "❌ Demo migration failed - Check logs"
          fi
