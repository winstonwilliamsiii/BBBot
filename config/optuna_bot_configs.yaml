  # ── Jupicita Bot ─ optimizer ──────────────────────────────────────────────
  Jupicita_Bot:
    name: "Jupicita_Bot"
    domain: "Small Cap Pairs Trading"
    algorithm:
      type: "optimizer"
      parameters:
        objective: "custom"
        eval_metric: "sharpe"
        loss_function: "custom"
        indicator_window: 20
        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
