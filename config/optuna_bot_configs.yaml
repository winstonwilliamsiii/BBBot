        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
        constraints:
          leverage_limit: 2.0
          sector_weights: "etf_diversified"
      hyperparameters:
        eta: [0.01, 0.3]
        max_depth: [3, 10]
        subsample: [0.5, 1.0]
        colsample_bytree: [0.5, 1.0]
        lambda: [0.0, 10.0]      # L2 regularization (reg_lambda in sklearn API)
        alpha: [0.0, 10.0]       # L1 regularization (reg_alpha in sklearn API)
        n_estimators: [100, 1000]
        min_child_weight: [1, 10]
    risk_management:
      stop_loss: "2_ATR"
      take_profit: "4_ATR"
      risk_per_trade: "1%"
      position_sizing: "kelly"
    data_sources:
      market_data: "csv"
      sentiment_feed: "finbert"
      indicators: ["RSI", "MACD", "ATR"]
    logging:
      format: "json"
      destination: "mysql"
      notify: "slack"

  # ── Rigel Bot ─ neural_network ────────────────────────────────────────────
  Rigel_Bot:
    name: "Rigel_Bot"
    domain: "FX Mean Reversion"
    algorithm:
      type: "neural_network"
      parameters:
        architecture: "LSTM"
        objective: "regression"
        eval_metric: "sharpe"
        loss_function: "mse"
        indicator_window: 14
        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
        constraints:
          leverage_limit: 2.0
          sector_weights: "fx_macro_balanced"
      hyperparameters:
        hidden_layers: [2, 5]
        neurons_per_layer: [64, 512]
        activation: ["relu", "tanh"]
        optimizer: ["Adam", "RMSprop"]
