name: Test Flask API and MLflow Services

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test-services:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov requests
        # Install Flask API dependencies
        pip install flask flask-cors
        if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
    
    - name: Start Flask API (Port 5001)
      run: |
        cd backend/api
        python app.py &
        echo $! > flask_pid.txt
        sleep 5
      env:
        PYTHONPATH: ${{ github.workspace }}
    
    - name: Test Flask API Health
      run: |
        # Test Flask API on port 5001
        response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5001/health)
        if [ $response -eq 200 ]; then
          echo "✅ Flask API is healthy on port 5001"
        else
          echo "❌ Flask API health check failed with status: $response"
          exit 1
        fi
        
        # Test Flask API root endpoint
        root_response=$(curl -s http://localhost:5001/)
        if echo "$root_response" | grep -q "Bentley Bot Control Center API"; then
          echo "✅ Flask API root endpoint is working"
        else
          echo "❌ Flask API root endpoint check failed"
          exit 1
        fi
        
        # Test admin endpoint
        admin_response=$(curl -s http://localhost:5001/admin/test)
        if echo "$admin_response" | grep -q "Admin API is accessible"; then
          echo "✅ Flask API admin endpoint is working"
        else
          echo "❌ Flask API admin endpoint check failed"
          exit 1
        fi
    
    - name: Start MLflow Server (Port 5000)
      run: |
        pip install mlflow==2.8.1 gunicorn==21.2.0
        mkdir -p /tmp/mlflow/artifacts /tmp/mlflow/db
        gunicorn -w 2 -b 0.0.0.0:5000 --timeout 120 --daemon \
          'mlflow.server:app' \
          --env MLFLOW_BACKEND_STORE_URI='sqlite:////tmp/mlflow/db/mlflow.db' \
          --env MLFLOW_DEFAULT_ARTIFACT_ROOT='/tmp/mlflow/artifacts'
        sleep 10
    
    - name: Test MLflow Health
      run: |
        # Test MLflow on port 5000
        response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
        if [ $response -eq 200 ]; then
          echo "✅ MLflow is healthy on port 5000"
        else
          echo "❌ MLflow health check failed with status: $response"
          exit 1
        fi
        
        # Test MLflow UI
        ui_response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/)
        if [ $ui_response -eq 200 ]; then
          echo "✅ MLflow UI is accessible"
        else
          echo "❌ MLflow UI check failed with status: $ui_response"
          exit 1
        fi
    
    - name: Test Port Isolation
      run: |
        echo "Testing that Flask API (5001) and MLflow (5000) don't conflict..."
        
        # Verify both services respond on their respective ports
        flask_response=$(curl -s http://localhost:5001/health | grep -q "Bentley Bot Control Center API" && echo "OK" || echo "FAIL")
        mlflow_response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
        
        if [ "$flask_response" = "OK" ] && [ "$mlflow_response" = "200" ]; then
          echo "✅ Both services are running on separate ports without conflicts"
        else
          echo "❌ Port conflict or service failure detected"
          echo "Flask API: $flask_response"
          echo "MLflow: $mlflow_response"
          exit 1
        fi
    
    - name: Cleanup
      if: always()
      run: |
        # Kill Flask API
        if [ -f backend/api/flask_pid.txt ]; then
          kill $(cat backend/api/flask_pid.txt) || true
        fi
        
        # Kill gunicorn processes
        pkill -f gunicorn || true
        
        echo "✅ Cleanup completed"
    
    - name: Summary
      if: success()
      run: |
        echo "🎉 All service tests passed!"
        echo "✅ Flask API: http://localhost:5001"
        echo "✅ MLflow: http://localhost:5000"
        echo "✅ No port conflicts detected"
