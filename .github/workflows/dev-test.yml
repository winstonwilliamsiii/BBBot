# ============================================
# Development Branch Testing & Validation
# Runs on every push to dev branch
# ============================================
name: Dev - Test & Validate

on:
  push:
    branches: 
      - dev
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/dev-test.yml'
  pull_request:
    branches: 
      - dev

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']  # Test multiple Python versions
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better diffs
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install flake8 pytest pytest-cov black isort
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # Stop on syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Check code quality
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting (Black)
      run: |
        black --check . --diff --exclude="venv|\.venv" || true
    
    - name: Check import sorting (isort)
      run: |
        isort --check-only . --diff --skip-gitignore || true
    
    - name: Run tests
      run: |
        pytest --tb=short --verbose --cov=. --cov-report=xml --cov-report=term 2>&1 || true
    
    - name: Upload coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-py${{ matrix.python-version }}
        path: coverage.xml
        retention-days: 7

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Check for vulnerable dependencies (Safety)
      run: |
        safety check --json || true
    
    - name: Security audit (Bandit)
      run: |
        bandit -r . -f json -o bandit-report.json || true

  env-validation:
    name: Environment Configuration Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Validate .env.development
      run: |
        if [ -f .env.development ]; then
          echo "✓ .env.development exists"
          grep -E "ENVIRONMENT=development|DEPLOYMENT_TARGET=localhost" .env.development || exit 1
        fi
    
    - name: Validate .env.production
      run: |
        if [ -f .env.production ]; then
          echo "✓ .env.production exists"
          grep -E "ENVIRONMENT=production|DEPLOYMENT_TARGET=streamlit_cloud" .env.production || exit 1
        fi
    
    - name: Check for exposed secrets
      run: |
        if grep -r "ALPACA_API_KEY=" .env.production 2>/dev/null | grep -v "***"; then
          echo "❌ WARNING: Possible exposed key in production config"
          exit 1
        fi
        echo "✓ No exposed keys detected in production config"

  python-compatibility:
    name: Python Compatibility Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Check for type hints and compatibility
      run: |
        python -m py_compile streamlit_app.py || true
        echo "✓ Python compilation check passed"
