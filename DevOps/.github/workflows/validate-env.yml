# ============================================
# Environment Variable Validation Workflow
# Prevents incomplete .env configurations from being deployed
# ============================================
name: Validate Environment Configuration

on:
  pull_request:
    branches: [main, dev]
    paths:
      - '.env.example'
      - '.env.development'
      - '.env.production'
      - 'config_env.py'
      - 'streamlit_app.py'
  push:
    branches: [main, dev]
    paths:
      - '.env.example'
      - 'config_env.py'

jobs:
  validate-env-completeness:
    name: Check Required Environment Variables
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Validate .env.example has all required variables
      run: |
        echo "🔍 Checking .env.example for required variables..."
        
        REQUIRED_VARS=(
          "MYSQL_HOST"
          "MYSQL_PORT"
          "MYSQL_USER"
          "MYSQL_PASSWORD"
          "MYSQL_DATABASE"
          "PLAID_CLIENT_ID"
          "PLAID_SECRET"
          "PLAID_ENV"
          "ALPACA_API_KEY"
          "ALPACA_SECRET_KEY"
          "MLFLOW_TRACKING_URI"
          "MLFLOW_BACKEND_STORE_URI"
          "MLFLOW_ARTIFACT_ROOT"
          "APPWRITE_ENDPOINT"
          "APPWRITE_PROJECT_ID"
          "APPWRITE_API_KEY"
        )
        
        MISSING=()
        for var in "${REQUIRED_VARS[@]}"; do
          if ! grep -q "^${var}=" .env.example; then
            MISSING+=("$var")
          fi
        done
        
        if [ ${#MISSING[@]} -gt 0 ]; then
          echo "❌ Missing required variables in .env.example:"
          printf '  - %s\n' "${MISSING[@]}"
          echo ""
          echo "💡 Add these variables to .env.example before merging"
          exit 1
        fi
        
        echo "✅ All required variables present in .env.example"
    
    - name: Validate config_env.py structure
      run: |
        python3 << 'EOF'
        import sys
        from pathlib import Path
        
        # Check config_env.py exists and has proper structure
        config_file = Path('config_env.py')
        if not config_file.exists():
            print("❌ config_env.py not found")
            sys.exit(1)
        
        content = config_file.read_text()
        
        required_functions = [
            'class EnvironmentConfig',
            'def _load_env_files',
            'def get(',
            'def is_production',
            'def is_development'
        ]
        
        missing = []
        for func in required_functions:
            if func not in content:
                missing.append(func)
        
        if missing:
            print("❌ config_env.py missing required functions:")
            for m in missing:
                print(f"  - {m}")
            sys.exit(1)
        
        print("✅ config_env.py structure validated")
        EOF
    
    - name: Test environment loading without actual credentials
      run: |
        python3 << 'EOF'
        import os
        import sys
        
        # Set a test environment
        os.environ['ENVIRONMENT'] = 'development'
        
        # Create a minimal test .env file
        with open('.env', 'w') as f:
            f.write('ENVIRONMENT=development\n')
            f.write('MYSQL_HOST=localhost\n')
            f.write('MYSQL_PORT=3306\n')
        
        try:
            from config_env import config
            
            # Test basic functionality
            env = config.get('ENVIRONMENT', 'not_set')
            if env == 'not_set':
                print("❌ ENVIRONMENT variable not loaded")
                sys.exit(1)
            
            print(f"✅ Environment loaded: {env}")
            
            # Test boolean conversion
            is_dev = config.is_development()
            print(f"✅ is_development() works: {is_dev}")
            
            # Test production check
            is_prod = config.is_production()
            print(f"✅ is_production() works: {is_prod}")
            
        except Exception as e:
            print(f"❌ Error loading config_env: {e}")
            import traceback
            traceback.print_exc()
            sys.exit(1)
        EOF
  
  check-secrets-template:
    name: Validate Streamlit Secrets Template
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check STREAMLIT_SECRETS_TEMPLATE.toml
      run: |
        if [ ! -f "STREAMLIT_SECRETS_TEMPLATE.toml" ]; then
          echo "⚠️ STREAMLIT_SECRETS_TEMPLATE.toml not found (recommended for Streamlit Cloud)"
          echo "This is not a failure, but recommended for production deployments"
          exit 0
        fi
        
        echo "✅ Streamlit secrets template found"
        
        # Check for required sections
        SECTIONS_FOUND=0
        grep -q "\[mysql\]" STREAMLIT_SECRETS_TEMPLATE.toml && ((SECTIONS_FOUND++))
        grep -q "\[plaid\]" STREAMLIT_SECRETS_TEMPLATE.toml && ((SECTIONS_FOUND++))
        grep -q "\[alpaca\]" STREAMLIT_SECRETS_TEMPLATE.toml && ((SECTIONS_FOUND++))
        
        if [ $SECTIONS_FOUND -eq 3 ]; then
          echo "✅ All required secret sections present (mysql, plaid, alpaca)"
        else
          echo "⚠️ Missing some secret sections (found $SECTIONS_FOUND of 3)"
          echo "Consider adding: [mysql], [plaid], [alpaca]"
        fi
