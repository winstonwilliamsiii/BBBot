        indicator_window: 14
        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
        constraints:
          leverage_limit: 2.0
          sector_weights: "balanced"
      hyperparameters:
        learning_rate: [0.0001, 0.01]
        max_depth: [3, 10]
        n_estimators: [100, 1000]
        subsample: [0.5, 1.0]
        colsample_bytree: [0.5, 1.0]
        min_child_weight: [1, 10]
        batch_size: [32, 256]
        epochs: [50, 500]
        dropout_rate: [0.1, 0.5]
        mutation_rate: [0.01, 0.1]
        crossover_rate: [0.5, 0.9]
    risk_management:
      stop_loss: "2_ATR"
      take_profit: "4_ATR"
      risk_per_trade: "1%"
      position_sizing: "<fixed | kelly | volatility_based>"
    data_sources:
      market_data: "<broker_api | csv | db>"
      sentiment_feed: "<news_api | finbert>"
      indicators: ["RSI", "MACD", "ATR"]
    logging:
      format: "json"
      destination: "<mysql | postgres | telemetry_dashboard>"
      notify: "<telegram | slack>"