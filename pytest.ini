[pytest]
# Pytest configuration for Bentley Budget Bot

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to ignore during test discovery
norecursedirs = 
    .git
    .github
    .venv
    venv
    env
    __pycache__
    .pytest_cache
    .mypy_cache
    node_modules
    dist
    build
    *.egg-info
    sites
    appwrite-functions
    integrations
    logs
    mlruns
    .vscode
    .conda

# Exclude patterns for test collection
# Skip Plaid integration tests since Plaid is not currently initialized
testpaths = tests

# Only collect tests from tests/ directory if it exists
# This prevents pytest from scanning the entire project

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Output options
addopts = 
    --verbose
    --tb=short
    --strict-markers
    -p no:warnings

# Minimum version
minversion = 6.0
