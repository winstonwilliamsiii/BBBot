# Streamlit Cloud Secrets Template
# 
# Location: Streamlit Cloud Dashboard → App Settings → Secrets
# 
# Copy the [sections] below into your Streamlit Secrets text box
# Replace ALL "YOUR_*_HERE" values with real credentials
# 
# For local testing: Save as .streamlit/secrets.toml instead

# ============================================
# ALPACA MARKETS - Stocks, ETFs, Crypto
# ============================================
[alpaca]
# Paper Mode (Simulated Trading - for testing ML experiments)
ALPACA_PAPER = "true"
ALPACA_PAPER_API_KEY = "pk_YOUR_ALPACA_PAPER_API_KEY_HERE"
ALPACA_PAPER_SECRET_KEY = "YOUR_ALPACA_PAPER_SECRET_KEY_HERE"

# Live Mode (Real Money Trading - optional, only if account is funded)
# Uncomment these to enable live trading
# ALPACA_LIVE_API_KEY = "pk_YOUR_ALPACA_LIVE_API_KEY_HERE"
# ALPACA_LIVE_SECRET_KEY = "YOUR_ALPACA_LIVE_SECRET_KEY_HERE"

# Optional: Base URL (auto-detected from mode if not specified)
# ALPACA_BASE_URL = "https://paper-api.alpaca.markets"

# ============================================
# METATRADER 5 - Forex, Indices, Commodities
# ============================================
[mt5]
# FTMO Proprietary Firm Account
MT5_USER = "YOUR_MT5_ACCOUNT_NUMBER"
MT5_PASSWORD = "YOUR_MT5_PASSWORD"
MT5_SERVER = "ftmo.traders"  # FTMO server name
MT5_PORT = "443"

# Optional: Python bridge API (if running remote MT5 bridge)
# MT5_API_URL = "http://localhost:8000"

# Optional: Mode-specific servers
# MT5_SERVER_PAPER = "ftmo.demo"
# MT5_SERVER_LIVE = "ftmo.traders"

# ============================================
# AXI (MultiBank Access) - Proprietary Firm
# ============================================
[axi]
# AXI MT5 Account Credentials
AXI_MT5_USER = "YOUR_AXI_ACCOUNT_NUMBER"
AXI_MT5_PASSWORD = "YOUR_AXI_PASSWORD"

# Paper vs Live Server
# For Paper (Demo): AXI_MT5_SERVER = "Axi-US51-Demo"
# For Live: AXI_MT5_SERVER = "Axi-US51-Live"
AXI_MT5_SERVER = "Axi-US51-Live"
AXI_MT5_PORT = "443"

# ============================================
# INTERACTIVE BROKERS (IBKR) - Stocks & Futures
# ============================================
[ibkr]
# TWS / IB Gateway Connection
IBKR_HOST = "127.0.0.1"
IBKR_PORT = "7496"
IBKR_CLIENT_ID = "1"

# Optional: Your IB Account ID (DU123456)
# IBKR_ACCOUNT = "DU123456"

# ============================================
# MYSQL DATABASE - Bot State & History
# ============================================
[mysql]
MYSQL_HOST = "YOUR_DATABASE_HOST"
MYSQL_PORT = "3306"
MYSQL_USER = "YOUR_DATABASE_USER"
MYSQL_PASSWORD = "YOUR_DATABASE_PASSWORD"
MYSQL_DATABASE = "bentleybot"

# For Railway.app or cloud databases
# MYSQL_HOST = "mysql.railway.internal"
# MYSQL_HOST = "production-mysql.c.railway.app"

# ============================================
# MLFLOW - ML Experiment Tracking
# ============================================
[mlflow]
# Local MLflow server (development)
MLFLOW_TRACKING_URI = "http://localhost:5000"
MLFLOW_SERVER_URL = "http://localhost:5000"

# Cloud MLflow (production - if using cloud MLflow)
# MLFLOW_TRACKING_URI = "https://your-mlflow-cloud.azurewebsites.net"
# MLFLOW_SERVER_URL = "https://your-mlflow-cloud.azurewebsites.net"

# Alternate storage backend
# MLFLOW_BACKEND_STORE_URI = "mysql://user:pass@host/mlflow"

# ============================================
# PLAID - Bank Account Linking
# ============================================
[plaid]
PLAID_ENV = "sandbox"  # "sandbox" for testing, "production" for live
PLAID_CLIENT_ID = "YOUR_PLAID_CLIENT_ID"
PLAID_SECRET = "YOUR_PLAID_SECRET"

# ============================================
# DISCORD - Bot Alerts & Notifications
# ============================================
[discord]
# Webhook URLs for different alert channels
DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
DISCORD_WEBHOOK_PROD = "https://discord.com/api/webhooks/YOUR_PROD_WEBHOOK_ID/YOUR_PROD_TOKEN"

# Optional: Different webhooks for different alert levels
# DISCORD_WEBHOOK_ERRORS = "https://discord.com/api/webhooks/..."
# DISCORD_WEBHOOK_TRADES = "https://discord.com/api/webhooks/..."

# ============================================
# API & SERVICE ENDPOINTS
# ============================================
[services]
CONTROL_CENTER_API_URL = "http://localhost:5001"
AIRFLOW_WEBSERVER_URL = "http://localhost:8080"
AIRBYTE_API_URL = "http://localhost:8001"

# ============================================
# OPENAI / LLM APIs (For GPT-based features)
# ============================================
[ai]
# OPENAI_API_KEY = "sk_YOUR_OPENAI_KEY"
# OPENAI_MODEL = "gpt-4-turbo"

# Hugging Face
# HUGGINGFACE_API_KEY = "hf_YOUR_HUGGINGFACE_KEY"

# ============================================
# STREAMLIT-SPECIFIC SETTINGS
# ============================================
[streamlit]
# These are read directly by Streamlit
# STREAMLIT_THEME_primaryColor = "#FF0000"
# STREAMLIT_LOGGER_LEVEL = "info"
# STREAMLIT_CLIENT_TOOLBARMODE = "minimal"

# ============================================
# EXAMPLE: How to structure credentials
# ============================================
# Good ✅ - Complete pair in same section:
# [alpaca]
# ALPACA_PAPER_API_KEY = "pk_..."
# ALPACA_PAPER_SECRET_KEY = "..."  # Matches above
#
# Bad ❌ - Mixed sections (causes 401 errors):
# [alpaca]
# ALPACA_PAPER_API_KEY = "pk_..."
# ALPACA_LIVE_SECRET_KEY = "..."  # Wrong secret!

# ============================================
# NOTES FOR STREAMLIT CLOUD USERS
# ============================================
#
# 1. Format: This file is TOML, not JSON (no quotes needed around sections)
# 2. Access: Use st.secrets["alpaca"]["ALPACA_PAPER_API_KEY"]
# 3. Reload: App auto-reloads when secrets change (usually within 1 min)
# 4. Testing: Test connection from Admin Control Center→ Broker Health tab
# 5. Privacy: Secrets are never visible in logs or version control
# 6. Rotation: Change API keys quarterly for security
#
# ============================================

