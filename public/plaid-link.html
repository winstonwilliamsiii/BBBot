<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaid Link - Not in iframe</title>
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <!-- Explicitly allow this page to be opened in full window, not iframe -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .plaid-container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #1f2937;
            margin-bottom: 0.5rem;
            font-size: 1.875rem;
        }
        
        .subtitle {
            color: #6b7280;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }
        
        .status {
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .status.loading {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .status.success {
            background: #dcfce7;
            color: #15803d;
        }
        
        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }
                .debug-info {
            background: #f3f4f6;
            border-left: 4px solid #6b7280;
            padding: 1rem;
            margin: 1rem 0;
            font-family: monospace;
            font-size: 0.875rem;
            max-height: 200px;
            overflow-y: auto;
            color: #374151;
        }
                button {
            width: 100%;
            padding: 12px 24px;
            background: #0a84ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: background 0.2s;
        }
        
        button:hover:not(:disabled) {
            background: #0066dd;
        }
        
        button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 2rem;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 8px;
            display: none;
        }
        
        .result h3 {
            color: #1f2937;
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }
        
        code {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            padding: 12px;
            border-radius: 6px;
            display: block;
            word-break: break-all;
            margin: 1rem 0;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            color: #1f2937;
        }
        
        .caption {
            color: #6b7280;
            font-size: 0.875rem;
            margin-top: 1rem;
            line-height: 1.5;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: currentColor;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="plaid-container">
        <h1>🏦 Plaid Link</h1>
        <p class="subtitle">Connect your bank account securely</p>
        
        <div id="status" class="status loading">
            <span class="spinner"></span>
            <span>Loading Plaid Link...</span>
        </div>
        
        <button id="open-link" disabled>
            Open Bank Connection
        </button>
        
        <div id="result" class="result">
            <h3>✅ Successfully Connected!</h3>
            <p><strong>Your Public Token:</strong></p>
            <code id="token-display"></code>
            <p class="caption">
                Copy this token and paste it back in the Plaid Test page. Then close this window.
            </p>
        </div>
    </div>

    <script>
        // Get link_token from URL query parameters
        const params = new URLSearchParams(window.location.search);
        const linkToken = params.get('link_token');
        
        console.log('Link token from URL:', linkToken ? linkToken.substring(0, 20) + '...' : 'MISSING');
        
        if (!linkToken || linkToken === 'None') {
            document.getElementById('status').className = 'status error';
            document.getElementById('status').innerHTML = '❌ Error: No link token provided. Check the URL.';
            document.getElementById('open-link').disabled = true;
            console.error('Link token is missing or None');
        } else {
            try {
                console.log('Initializing Plaid with token:', linkToken.substring(0, 30) + '...');
                
                // Initialize Plaid Link
                const handler = Plaid.create({
                    token: linkToken,
                    onSuccess: function(public_token, metadata) {
                        console.log('✅ Plaid success!', public_token.substring(0, 20) + '...', metadata);
                        
                        // Update UI
                        document.getElementById('status').className = 'status success';
                        document.getElementById('status').innerHTML = '✅ Successfully connected!';
                        document.getElementById('result').style.display = 'block';
                        document.getElementById('token-display').textContent = public_token;
                        
                        // Send to parent window if opened from one
                        if (window.opener) {
                            window.opener.postMessage({
                                type: 'plaid_success',
                                public_token: public_token,
                                metadata: metadata
                            }, window.location.origin);
                            console.log('Sent message to parent window');
                        }
                    },
                    onExit: function(err, metadata) {
                        console.log('Plaid exit:', err, metadata);
                        document.getElementById('status').className = 'status error';
                        if (err) {
                            document.getElementById('status').innerHTML = '❌ Error: Connection failed or cancelled';
                            console.error('Plaid error:', err);
                        } else {
                            document.getElementById('status').innerHTML = '⚠️ Connection cancelled';
                        }
                    },
                    onLoad: function() {
                        console.log('✅ Plaid Link fully loaded');
                        document.getElementById('status').className = 'status success';
                        document.getElementById('status').innerHTML = '✅ Ready! Click button to open bank connection.';
                        document.getElementById('open-link').disabled = false;
                    },
                    onEvent: function(eventName, metadata) {
                        console.log('Plaid event:', eventName, metadata);
                    }
                });
                
                // Button click handler
                document.getElementById('open-link').onclick = function() {
                    console.log('Opening Plaid Link...');
                    handler.open();
                };
                
                console.log('Plaid handler created successfully');
                
            } catch (e) {
                document.getElementById('status').className = 'status error';
                document.getElementById('status').innerHTML = '❌ Error: ' + e.message;
                console.error('Error initializing Plaid:', e);
            }
        }
    </script>
</body>
</html>
