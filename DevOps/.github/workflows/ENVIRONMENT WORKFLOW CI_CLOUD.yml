#ENVIRONMENT WORKFLOW CI/Cloud

name: Deploy to Streamlit

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run tests
        run: |
          if [ -f pytest.ini ]; then
            pip install pytest
            pytest || echo "Tests completed"
          fi
          
      - name: Deploy to Streamlit Cloud
        run: |
          echo "✅ Code pushed to main - Streamlit Cloud will auto-deploy"
          echo "📡 Monitor deployment at: https://share.streamlit.io/"
          echo "🔗 App URL will be available after deployment completes"
