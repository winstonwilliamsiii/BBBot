name: Migrate Database - Production Environment

on:
  push:
    branches:
      - main
    paths:
      - 'migrations/base/**'
      - 'migrations/prod/**'
      - '.github/workflows/migrate-prod.yml'
  workflow_dispatch:
    inputs:
      skip_backup:
        description: 'Skip database backup (not recommended)'
        required: false
        default: 'false'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Validate migration files
        run: |
          echo "Validating migration files..."
          find migrations/base migrations/prod -name "*.sql" -type f | while read file; do
            echo "Checking: $file"
            # Basic SQL syntax validation
            grep -E "^(CREATE|ALTER|INSERT|UPDATE|DELETE|DROP)" "$file" > /dev/null || true
          done

  backup:
    runs-on: ubuntu-latest
    environment: production
    needs: validate
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Backup production database
        env:
          DB_PROD_HOST: ${{ secrets.DB_PROD_HOST }}
          DB_PROD_PORT: ${{ secrets.DB_PROD_PORT }}
          DB_PROD_USER: ${{ secrets.DB_PROD_USER }}
          DB_PROD_PASSWORD: ${{ secrets.DB_PROD_PASSWORD }}
        run: |
          echo "Creating production database backup..."
          BACKUP_FILE="prod_backup_$(date +%Y%m%d_%H%M%S).sql"
          
          mysqldump \
            --host=$DB_PROD_HOST \
            --port=$DB_PROD_PORT \
            --user=$DB_PROD_USER \
            --password=$DB_PROD_PASSWORD \
            --all-databases \
            > $BACKUP_FILE
          
          echo "Backup created: $BACKUP_FILE"
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV
      
      - name: Upload backup to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
        run: |
          aws s3 cp $BACKUP_FILE s3://$BACKUP_BUCKET/prod-backups/

  migrate:
    runs-on: ubuntu-latest
    environment: production
    needs: backup
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
      
      - name: Run database migrations (Production)
        env:
          DB_PROD_HOST: ${{ secrets.DB_PROD_HOST }}
          DB_PROD_PORT: ${{ secrets.DB_PROD_PORT }}
          DB_PROD_USER: ${{ secrets.DB_PROD_USER }}
          DB_PROD_PASSWORD: ${{ secrets.DB_PROD_PASSWORD }}
        run: |
          python scripts/migration_manager.py \
            --env prod \
            --action execute \
            --migration-dir migrations
      
      - name: Verify migration success
        env:
          DB_PROD_HOST: ${{ secrets.DB_PROD_HOST }}
          DB_PROD_PORT: ${{ secrets.DB_PROD_PORT }}
          DB_PROD_USER: ${{ secrets.DB_PROD_USER }}
          DB_PROD_PASSWORD: ${{ secrets.DB_PROD_PASSWORD }}
        run: |
          python scripts/migration_manager.py \
            --env prod \
            --action status
      
      - name: Run smoke tests
        env:
          DB_PROD_HOST: ${{ secrets.DB_PROD_HOST }}
          DB_PROD_PORT: ${{ secrets.DB_PROD_PORT }}
          DB_PROD_USER: ${{ secrets.DB_PROD_USER }}
          DB_PROD_PASSWORD: ${{ secrets.DB_PROD_PASSWORD }}
        run: |
          python -m pytest tests/smoke/ -v
      
      - name: Send Production Migration Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[BBBot] Production Migration ${{ job.status == 'success' && '✅ Complete' || '❌ Failed' }}"
          to: wwilliams@mansacap.com
          from: Bentley Bot System <noreply@bentleybot.com>
          body: |
            Production Database Migration Report
            
            Status: ${{ job.status }}
            Branch: main
            Commit: ${{ github.sha }}
            Timestamp: ${{ github.event.head_commit.timestamp }}
            
            ${{ job.status == 'success' && '✅ Migration completed successfully. Production environment is now live.' || '❌ Migration failed. Please check GitHub Actions logs and restore from backup if needed.' }}
            
            View workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      
      - name: Send Discord Trading Signal Alert (Success)
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "content": "🚀 **PRODUCTION LIVE - Trading Signals Active**",
              "embeds": [{
                "title": "Bentley Bot Production Deployment",
                "description": "Production migration complete. Real-money trading signals now broadcasting.",
                "color": 3066993,
                "fields": [
                  {"name": "Status", "value": "✅ Live", "inline": true},
                  {"name": "Environment", "value": "Production", "inline": true},
                  {"name": "Commit", "value": "'"${{ github.sha }}"'", "inline": false}
                ],
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"'"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_PROD }}
      
      - name: Send Telegram Trading Signal Alert (Success)
        if: success()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=🚀 *PRODUCTION LIVE - Trading Signals Active*%0A%0A✅ Bentley Bot production deployment complete%0A📊 Real-money trading signals now broadcasting%0A🔗 Commit: \`${{ github.sha }}\`"
      
      - name: Send Discord Alert (Failure)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "content": "🚨 **PRODUCTION MIGRATION FAILED - URGENT**",
              "embeds": [{
                "title": "Production Deployment Failed",
                "description": "Production migration failed. Trading signals NOT active. Backup available for restoration.",
                "color": 15158332,
                "fields": [
                  {"name": "Status", "value": "❌ Failed", "inline": true},
                  {"name": "Action Required", "value": "Check logs immediately", "inline": true},
                  {"name": "Workflow", "value": "'"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"'", "inline": false}
                ],
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"'"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_PROD }}
      
      - name: Send Telegram Alert (Failure)
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=🚨 *PRODUCTION MIGRATION FAILED*%0A%0A❌ Deployment failed - Trading signals NOT active%0A🔧 Action required: Check logs immediately%0A🔗 Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  rollback:
    runs-on: ubuntu-latest
    environment: production
    needs: migrate
    if: failure()
    
    steps:
      - name: Notify On-Call Engineer
        run: |
          echo "ROLLBACK REQUIRED - Manual intervention needed"
          echo "Production database migration has failed"
          echo "Backup available in S3"
