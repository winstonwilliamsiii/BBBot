    data_sources:
      market_data: "broker_api"
      sentiment_feed: "finbert"
      indicators: ["RSI", "MACD", "ATR", "Bollinger"]
    logging:
      format: "json"
      destination: "mysql"
      notify: "slack"

  # ── Draco Bot ─ sentiment_nlp ─────────────────────────────────────────────
  Draco_Bot:
    name: "Draco_Bot"
    domain: "Multi-Factor Sentiment"
    algorithm:
      type: "sentiment_nlp"
      parameters:
        objective: "classification"
        eval_metric: "auc"
        loss_function: "cross_entropy"
        indicator_window: 14
        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
        constraints:
          leverage_limit: 2.0
          sector_weights: "balanced"
      hyperparameters:
        learning_rate: [0.0001, 0.01]
        batch_size: [32, 256]
        epochs: [50, 500]
        dropout_rate: [0.1, 0.5]
        max_seq_length: [64, 512]
        num_attention_heads: [2, 16]
    risk_management:
      stop_loss: "2_ATR"
      take_profit: "4_ATR"
      risk_per_trade: "1%"
      position_sizing: "volatility_based"
    data_sources:
      market_data: "broker_api"
      sentiment_feed: "finbert"
      indicators: ["RSI", "MACD", "ATR", "Sentiment_Score"]
    logging:
      format: "json"
      destination: "mysql"
      notify: "telegram"

  # ── Procryon Bot ─ neural_network ─────────────────────────────────────────
  Procryon_Bot:
    name: "Procryon_Bot"
    domain: "MT5 Spread Arbitrage"
    algorithm:
      type: "neural_network"
      parameters:
        architecture: "KNN_FNN"
        objective: "classification"
        eval_metric: "sharpe"
        loss_function: "cross_entropy"
        indicator_window: 5
        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
        constraints:
          leverage_limit: 1.0
          sector_weights: "balanced"
      hyperparameters:
        knn_k: [3, 15]
        hidden_layers: [2, 4]
        neurons_per_layer: [32, 256]
        activation: ["relu", "tanh"]
        learning_rate: [0.0001, 0.01]
        batch_size: [32, 128]
        epochs: [50, 300]
        dropout_rate: [0.1, 0.4]
    risk_management:
      stop_loss: "1_ATR"
      take_profit: "2_ATR"
      risk_per_trade: "0.5%"
      position_sizing: "fixed"
    data_sources:
      market_data: "broker_api"
      sentiment_feed: "news_api"
      indicators: ["Spread_bps", "Slippage_bps", "Venue_Confidence"]
    logging:
      format: "json"
      destination: "mysql"
      notify: "slack"

  # ── Orion Bot ─ technical_strategy ───────────────────────────────────────
  Orion_Bot:
    name: "Orion_Bot"
    domain: "Minerals & Commodities"
    algorithm:
      type: "technical_strategy"
      parameters:
        objective: "classification"
        eval_metric: "sharpe"
        loss_function: "cross_entropy"
        indicator_window: 14
        thresholds:
          rsi_overbought: 65
          rsi_oversold: 35
        constraints:
          leverage_limit: 2.0
          sector_weights: "commodities_overweight"
      hyperparameters:
        rsi_period: [10, 21]
        rsi_overbought_threshold: [60, 75]
        rsi_oversold_threshold: [25, 40]
        atr_multiplier_sl: [1.0, 3.0]
        atr_multiplier_tp: [2.0, 5.0]
        volume_filter_ratio: [1.0, 3.0]
        scan_top_n: [2, 6]
    risk_management:
      stop_loss: "1.5_ATR"
      take_profit: "3_ATR"
      risk_per_trade: "1%"
      position_sizing: "fixed"
    data_sources:
      market_data: "broker_api"
      sentiment_feed: "news_api"
      indicators: ["RSI", "ATR", "Volume"]
    logging:
      format: "json"
      destination: "mysql"
      notify: "slack"

  # ── Dione Bot ─ optimizer ─────────────────────────────────────────────────
  Dione_Bot:
    name: "Dione_Bot"
    domain: "Options Mispricing"
    algorithm:
      type: "optimizer"
      parameters:
        objective: "custom"
        eval_metric: "sharpe"
        loss_function: "custom"
        indicator_window: 15
        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
        constraints:
          leverage_limit: 2.5
          sector_weights: "balanced"
      hyperparameters:
        zscore_entry: [1.5, 3.0]
        zscore_exit: [0.0, 1.0]
        lookback_days: [10, 60]
        min_spread_pct: [0.5, 3.0]
        max_contracts: [1, 10]
        mutation_rate: [0.01, 0.1]
        crossover_rate: [0.5, 0.9]
    risk_management:
      stop_loss: "2_ATR"
      take_profit: "4_ATR"
      risk_per_trade: "1%"
      position_sizing: "fixed"
    data_sources:
      market_data: "broker_api"
      sentiment_feed: "news_api"
      indicators: ["FVFI", "ROVL", "IV_Surface", "Put_Call_Ratio"]
    logging:
      format: "json"
      destination: "mysql"
      notify: "slack"

  # ── Cephei Bot ─ optimizer (Planned) ─────────────────────────────────────
  Cephei_Bot:
