# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"
        cache-dependency-path: requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Set PYTHONPATH
      run: |
        echo "PYTHONPATH=${{ github.workspace }}/src:${{ github.workspace }}" >> $GITHUB_ENV
    
    - name: Lint with flake8
      run: |
        flake8 src tests --config=setup.cfg
    - name: Test with pytest
      env:
        PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
      run: |
        pytest -c config/pytest.ini tests/test_mansa_titan_bot.py tests/test_stars_orchestration.py tests/test_rhea_bot.py



