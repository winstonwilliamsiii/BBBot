#GITHUB ACTIONS WORKFLOW: STREAMLIT TO Vercel
name: Deploy Streamlit to Vercel

on:
  push:
    branches:
      - main   # Deploy only when main branch updates
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ --maxfail=1 --disable-warnings -q

      - name: Build Streamlit app
        run: |
          streamlit version
          # Optional: run lint or pre-deploy checks
          echo "Streamlit build successful"

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./streamlit_app
          scope: ${{ secrets.VERCEL_SCOPE }}