[pytest]
# Pytest configuration for Bentley Budget Bot

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to ignore during test discovery
norecursedirs = 
    .git
    .github
    .archive
    .venv
    venv
    env
    __pycache__
    .pytest_cache
    .mypy_cache
    node_modules
    dist
    build
    *.egg-info
    sites
    appwrite-functions
    scripts
    integrations
    logs
    mlruns
    .vscode
    .conda

# Exclude patterns for test collection
# Skip all integration test scripts and only run proper unit tests
# Most files in tests/ are actually integration scripts, not unit tests
collect_ignore =
    tests/test_alpaca_connection.py
    tests/test_plaid_api.py
    tests/test_mysql_connection.py
    tests/test_database_connections.py
    tests/test_dual_mysql_connections.py
    tests/test_mt5_connection.py
    tests/test_webull_connection.py
    tests/test_bbbot1_connection.py
    tests/test_api_connections.py
    tests/test_appwrite_services.py
    tests/test_stocktwits.py
    tests/test_tiingo.py
    tests/test_trade_api.js
    tests/tiingo_integration.py
    tests/test_all_sources.py
    tests/test_crypto_plaid_fix.py
    tests/test_env_reload.py
    tests/test_env_streamlit.py
    tests/test_error_caching.py
    tests/test_fundamentals.py
    tests/test_investment_fix.py
    tests/test_investment_rbac.py
    tests/test_mlflow_dashboard.py
    tests/test_multi_broker.py
    tests/test_personal_budget_complete.py
    tests/test_plaid_config.py
    tests/test_plaid_simple.py
    tests/test_rbac_fix.py
    tests/test_rbac_page_access.py
    tests/test_streamlit_env.py
    tests/test_streamlit_pages.py
    tests/test_streamlit_secrets.py

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Output options
addopts = 
    --verbose
    --tb=short
    --strict-markers
    -p no:warnings
    --ignore=tests/test_alpaca_connection.py
    --ignore=tests/test_plaid_api.py
    --ignore=tests/test_mysql_connection.py
    --ignore=tests/test_database_connections.py
    --ignore=tests/test_dual_mysql_connections.py
    --ignore=tests/test_mt5_connection.py
    --ignore=tests/test_webull_connection.py
    --ignore=tests/test_bbbot1_connection.py
    --ignore=tests/test_api_connections.py
    --ignore=tests/test_appwrite_services.py
    --ignore=tests/test_stocktwits.py
    --ignore=tests/test_tiingo.py
    --ignore=tests/test_trade_api.js
    --ignore=tests/tiingo_integration.py
    # Only run properly mocked unit tests, not integration scripts

[coverage:run]
# Coverage configuration to avoid issues with problematic files
omit = 
    */tests/test_alpaca_connection.py
    */tests/test_plaid_api.py
    */tests/test_mysql_connection.py
    */tests/test_*connection*.py
    */tests/test_*plaid*.py
    */tests/test_streamlit*.py
    */tests/test_*broker*.py
    */tests/test_*rbac*.py
    */tests/test_*fix*.py
    */tests/tiingo_integration.py
    */#*.py
    */\#*.py
    .venv/*
    venv/*
    env/*
    */site-packages/*
    */dist-packages/*
    
[coverage:report]
# Ignore missing source files (for files that can't be imported)
ignore_errors = True
skip_empty = True

# Minimum version
minversion = 6.0
