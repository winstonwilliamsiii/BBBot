name: Test & Validate

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
    paths:
      - 'pages/**'
      - 'frontend/**'
      - 'sites/**'
      - '.env.development'
      - 'requirements.txt'
      - 'scripts/**'
      - '.github/workflows/test.yml'

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install flake8 black isort
      
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 pages/ frontend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 pages/ frontend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Check import sorting with isort
        run: |
          isort --check-only pages/ frontend/ --diff || true
      
      - name: Check code formatting with black
        run: |
          black --check pages/ frontend/ || true

  test-db-schema:
    name: Validate Database Schema
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_bentley_bot
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -u root -proot -e "SELECT 1" >/dev/null 2>&1; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 1
          done
          echo "MySQL failed to start"
          exit 1
      
      - name: Test database schema initialization
        run: |
          python scripts/setup/init_trading_bot_db.py
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: test_bentley_bot
      
      - name: Verify database tables
        run: |
          mysql -h 127.0.0.1 -u root -proot test_bentley_bot -e "SHOW TABLES;"
          mysql -h 127.0.0.1 -u root -proot test_bentley_bot -e "SELECT COUNT(*) FROM bot_status;"
          mysql -h 127.0.0.1 -u root -proot test_bentley_bot -e "SELECT COUNT(*) FROM trading_signals;"
          mysql -h 127.0.0.1 -u root -proot test_bentley_bot -e "SELECT COUNT(*) FROM trades_history;"
          mysql -h 127.0.0.1 -u root -proot test_bentley_bot -e "SELECT COUNT(*) FROM performance_metrics;"

  verify-env-vars:
    name: Verify Environment Variables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check .env.example exists
        run: |
          if [ ! -f .env.example ]; then
            echo "⚠️  .env.example not found"
            exit 1
          fi
          echo "✅ .env.example found"
      
      - name: Verify required variables in .env.example
        run: |
          required_vars=("DB_HOST" "DB_PORT" "DB_USER" "DB_PASSWORD" "DB_NAME" "MYSQL_HOST" "MYSQL_PORT")
          for var in "${required_vars[@]}"; do
            if grep -q "^$var=" .env.example; then
              echo "✅ $var documented"
            elif grep -q "^# *$var=" .env.example; then
              echo "✅ $var documented"
            else
              echo "❌ $var not documented in .env.example"
              exit 1
            fi
          done
      
      - name: Verify .env.development is not in .gitignore
        run: |
          if grep -q "^\.env\.development$" .gitignore 2>/dev/null; then
            echo "❌ .env.development should NOT be in .gitignore"
            exit 1
          else
            echo "✅ .env.development is correctly tracked"
          fi
      
      - name: Verify sensitive files ARE in .gitignore
        run: |
          sensitive_files=(".env$" "\.env\.local$" "\.env\.production$" "secrets.toml")
          for file in "${sensitive_files[@]}"; do
            if grep -q "$file" .gitignore 2>/dev/null; then
              echo "✅ $file is correctly gitignored"
            fi
          done

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run tests (if they exist)
        run: |
          if [ -d "tests/" ]; then
            pytest tests/ -v --cov=pages --cov=frontend --cov-report=xml
          else
            echo "No tests directory found, skipping tests"
          fi

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check for exposed secrets in staged files
        run: |
          # Fail if any obvious secrets found in code
          if git diff --cached | grep -iE "(password|secret|api_key|token)" | grep -v "# " | grep -v ".env.example"; then
            echo "⚠️  Potential secrets detected in code!"
            exit 1
          fi
          echo "✅ No obvious secrets detected"
      
      - name: Check for hardcoded credentials
        run: |
          if grep -r "password.*=" pages/ frontend/ --include="*.py" | grep -v "getenv\|#"; then
            echo "⚠️  Hardcoded passwords found!"
            exit 1
          fi
          echo "✅ No hardcoded passwords detected"

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, test-db-schema, verify-env-vars, unit-tests, security-check]
    if: always()
    steps:
      - name: Report Results
        run: |
          echo "✅ All validation checks completed!"
          echo "Status Summary:"
          echo "  - Linting: ${{ needs.lint.result }}"
          echo "  - DB Schema: ${{ needs.test-db-schema.result }}"
          echo "  - Env Vars: ${{ needs.verify-env-vars.result }}"
          echo "  - Unit Tests: ${{ needs.unit-tests.result }}"
          echo "  - Security: ${{ needs.security-check.result }}"
