name: Deploy to Streamlit Cloud

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  validate:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Validate schema syntax
        run: |
          python -c "
          import sqlparse
          with open('scripts/setup/init_trading_bot_db.py', 'r') as f:
              content = f.read()
          print('✅ Schema file is valid Python')
          "
      
      - name: Check deployment requirements
        run: |
          echo "Checking deployment requirements..."
          
          # Verify key files exist
          test -f "streamlit_app.py" && echo "✅ streamlit_app.py found" || (echo "❌ streamlit_app.py not found" && exit 1)
          test -f "requirements.txt" && echo "✅ requirements.txt found" || (echo "❌ requirements.txt not found" && exit 1)
          test -f ".streamlit/config.toml" && echo "✅ .streamlit/config.toml found" || (echo "❌ .streamlit/config.toml not found" && exit 1)
          
          echo "✅ All deployment files present"

  deploy:
    name: Deploy to Streamlit Cloud
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Streamlit Cloud
        run: |
          echo "📦 Deployment triggered for commit: ${{ github.sha }}"
          echo "🚀 Streamlit Cloud will auto-redeploy the app"
          echo "⏱️  Deployment typically completes within 2-3 minutes"
          echo ""
          echo "Deployment Details:"
          echo "  Branch: main"
          echo "  Commit: ${{ github.sha }}"
          echo "  Author: ${{ github.actor }}"
          echo "  Timestamp: $(date)"
          echo ""
          echo "✅ Deployment queued - Streamlit Cloud will handle the rest"

  post-deploy-check:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v3
      
      - name: Create deployment notification
        run: |
          cat > deployment_info.txt << EOF
          ✅ DEPLOYMENT COMPLETED
          
          Branch: main
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          
          App URL: Check Streamlit Cloud dashboard
          Status: Live (2-3 minute deployment window)
          
          Timeline:
          - Deployment Started: $(date)
          - Expected Completion: Within 3 minutes
          - Check app status in Streamlit Cloud dashboard
          
          If issues occur:
          1. Check Streamlit Cloud logs
          2. Verify database secrets in dashboard
          3. Review GitHub Actions workflow
          EOF
          
          cat deployment_info.txt
      
      - name: Upload deployment summary
        uses: actions/upload-artifact@v3
        with:
          name: deployment-summary
          path: deployment_info.txt
          retention-days: 7

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [deploy, post-deploy-check]
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deployment to Streamlit Cloud initiated successfully"
            echo "The app will be live within 2-3 minutes"
            exit 0
          else
            echo "❌ Deployment had issues"
            exit 1
          fi
