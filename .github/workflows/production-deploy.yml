name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Production Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Match Streamlit Cloud Python version
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8
      
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat warnings as warnings only
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run critical tests
        env:
          ENVIRONMENT: production
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v -m "not slow"
          else
            echo "No tests directory found"
          fi
        continue-on-error: false
      
      - name: Validate production files
        run: |
          python -m py_compile streamlit_app.py
          python -m py_compile api/index.py
          # Check for sensitive data
          if grep -r "sk-" . --exclude-dir=".git" --exclude-dir="__pycache__"; then
            echo "ERROR: Potential API keys found in code!"
            exit 1
          fi

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Streamlit Cloud
        run: |
          echo "🚀 Deployment triggered to Streamlit Cloud"
          echo "Streamlit Cloud will automatically deploy from main branch"
          echo "Monitor deployment at: https://share.streamlit.io/"
      
      - name: Verify Vercel deployment ready
        run: |
          if [ -f "vercel.json" ]; then
            echo "✅ Vercel configuration found"
          fi
      
      - name: Create deployment tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          TAG="production-$(date +'%Y%m%d-%H%M%S')"
          git tag -a $TAG -m "Production deployment $TAG"
          git push origin $TAG || echo "Tag push failed (this is OK for forks)"

  notify:
    name: Deployment Notification
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Production deployment successful!"
          else
            echo "❌ Production deployment failed or skipped"
          fi
