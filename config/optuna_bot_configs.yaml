# Shared Optuna hyperparameter schema for Bentley bot training.
#
# Loader  : frontend/utils/optuna_config_loader.py → load_optuna_bot_config()
# Training: bentley-bot/mlflow/train.py → train_model() / suggest_optuna_params_for_bot()
#
# ─────────────────────────────────────────────────────────────────────────────
# ALGORITHM TYPE → FIXED PARAMETERS / TUNABLE HYPERPARAMETERS
# ─────────────────────────────────────────────────────────────────────────────
#
# xgboost         Fixed : objective, eval_metric, booster
#                 Tunable: eta, max_depth, subsample, colsample_bytree,
#                          lambda (L2), alpha (L1), n_estimators, min_child_weight
#
# random_forest   Fixed : objective, eval_metric, criterion, bootstrap
#                 Tunable: n_estimators, max_depth, min_samples_split,
#                          min_samples_leaf, max_features, max_samples
#
# neural_network  Fixed : architecture, objective, eval_metric, loss_function
#                 Tunable: hidden_layers | filters, neurons_per_layer | dense_units,
#                          activation (categorical), optimizer (categorical),
#                          learning_rate, batch_size, epochs, dropout_rate, weight_decay
#
# sentiment_nlp   Fixed : objective, eval_metric, loss_function
#                 Tunable: learning_rate, batch_size, epochs, dropout_rate,
#                          max_seq_length, num_attention_heads
#
# technical_strategy
#                 Fixed : objective, eval_metric, indicator_window, fixed thresholds
#                 Tunable: rsi_period, rsi_overbought/oversold_threshold,
#                          atr_multiplier_sl/tp, volume_filter_ratio, scan_top_n
#
# optimizer       Fixed : objective, eval_metric
#                 Tunable: zscore_entry/exit, lookback_days, hedge_ratio,
#                          mutation_rate, crossover_rate (GA), population_size
#
# ─────────────────────────────────────────────────────────────────────────────
# BOT CONSTELLATION (14 bots)
# ─────────────────────────────────────────────────────────────────────────────
# Bot             Algorithm            Fund               Strategy
# ─────────────── ──────────────────── ────────────────── ─────────────────────
# Titan_Bot       neural_network (CNN) Mansa Tech         CNN Deep Learning
# Vega_Bot        xgboost              Mansa Retail       MTF-ML Breakout
# Rhea_Bot        random_forest        Mansa ADI          Intra-Day / Swing
# Triton_Bot      neural_network (LSTM)Mansa Transport    ARIMA + LSTM Swing
# Altair_Bot      sentiment_nlp        Mansa AI Fund      News Trading
# Hydra_Bot       neural_network       Mansa Health       Healthcare Momentum
# Dogon_Bot       xgboost              Mansa ETF          Portfolio Optimizer
# Rigel_Bot       neural_network (LSTM)Mansa FOREX        FX Mean Reversion
# Draco_Bot       sentiment_nlp        Mansa Money Bag    Sentiment Analyzer
# Procryon_Bot    neural_network       Prop Trading       KNN + FNN Arb
# Orion_Bot       technical_strategy   Mansa Minerals     GoldRSI
# Dione_Bot       optimizer            Mansa Options      Put-Call Parity
# Cephei_Bot      optimizer (Planned)  Mansa Functions Options  Options CFD Trading
# Jupicita_Bot    optimizer            Mansa Smalls       Pairs Trading
# ─────────────────────────────────────────────────────────────────────────────

bot_configs:

  # ── Titan Bot ─ neural_network ─────────────────────────────────────────────
  Titan_Bot:
    name: "Titan_Bot"
    domain: "Mag7 + Tech Equities"
    algorithm:
      type: "neural_network"
      parameters:
        architecture: "CNN"
        objective: "classification"
        eval_metric: "auc"
        loss_function: "cross_entropy"
        indicator_window: 20
        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
        constraints:
          leverage_limit: 1.5
          sector_weights: "tech_overweight"
      hyperparameters:
        filters: [32, 256]
        kernel_size: [3, 7]
        dense_units: [64, 512]
        learning_rate: [0.0001, 0.01]
        batch_size: [32, 256]
        epochs: [50, 300]
        dropout_rate: [0.1, 0.5]
        weight_decay: [0.0, 0.01]
    risk_management:
      stop_loss: "2_ATR"
      take_profit: "4_ATR"
      risk_per_trade: "1%"
      position_sizing: "kelly"
    data_sources:
      market_data: "broker_api"
      sentiment_feed: "finbert"
      indicators: ["RSI", "MACD", "ATR", "EMA"]
    logging:
      format: "json"
      destination: "mysql"
      notify: "slack"

  # ── Vega Bot ─ xgboost ────────────────────────────────────────────────────
  Vega_Bot:
    name: "Vega_Bot"
    domain: "Retail Breakout / MTF-ML"
    algorithm:
      type: "xgboost"
      parameters:
        objective: "classification"
        eval_metric: "auc"
        booster: "gbtree"
        indicator_window: 20
        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
        constraints:
          leverage_limit: 1.5
          sector_weights: "balanced"
      hyperparameters:
        eta: [0.01, 0.3]
        max_depth: [3, 8]
        subsample: [0.5, 1.0]
        colsample_bytree: [0.5, 1.0]
        lambda: [0.0, 10.0]
        alpha: [0.0, 10.0]
        n_estimators: [100, 500]
        min_child_weight: [1, 10]
    risk_management:
      stop_loss: "1.5_ATR"
      take_profit: "3_ATR"
      risk_per_trade: "1%"
      position_sizing: "volatility_based"
    data_sources:
      market_data: "broker_api"
      sentiment_feed: "news_api"
      indicators: ["RSI", "VWAP", "ATR", "Breakout_Level"]
    logging:
      format: "json"
      destination: "mysql"
      notify: "slack"

  # ── Rhea Bot ─ random_forest ──────────────────────────────────────────────
  Rhea_Bot:
    name: "Rhea_Bot"
    domain: "Aerospace, Defense & Industrials"
    algorithm:
      type: "random_forest"
      parameters:
        objective: "classification"
        eval_metric: "auc"
        criterion: "gini"
        bootstrap: true
        indicator_window: 20
        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
        constraints:
          leverage_limit: 1.5
          sector_weights: "adi_weighted"
      hyperparameters:
        n_estimators: [100, 1000]
        max_depth: [10, 100]
        min_samples_split: [2, 20]
        min_samples_leaf: [1, 10]
        max_features: ["sqrt", "log2"]
        max_samples: [0.5, 1.0]
    risk_management:
      stop_loss: "2_ATR"
      take_profit: "4_ATR"
      risk_per_trade: "1%"
      position_sizing: "volatility_based"
    data_sources:
      market_data: "broker_api"
      sentiment_feed: "news_api"
      indicators: ["FVFI", "ROVL", "ADI", "RSI"]
    logging:
      format: "json"
      destination: "mysql"
      notify: "slack"

  # ── Triton Bot ─ neural_network ───────────────────────────────────────────
  Triton_Bot:
    name: "Triton_Bot"
    domain: "Transportation Swing Trading"
    algorithm:
      type: "neural_network"
      parameters:
        architecture: "ARIMA_LSTM"
        objective: "regression"
        eval_metric: "rmse"
        loss_function: "mse"
        indicator_window: 252
        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
        constraints:
          leverage_limit: 1.5
          sector_weights: "transport_sector"
      hyperparameters:
        arima_p: [0, 5]
        arima_d: [0, 2]
        arima_q: [0, 5]
        lstm_units: [32, 256]
        learning_rate: [0.0001, 0.01]
        batch_size: [32, 128]
        epochs: [50, 300]
        dropout_rate: [0.1, 0.5]
    risk_management:
      stop_loss: "2_ATR"
      take_profit: "4_ATR"
      risk_per_trade: "1%"
      position_sizing: "volatility_based"
    data_sources:
      market_data: "broker_api"
      sentiment_feed: "news_api"
      indicators: ["ARIMA", "LSTM", "RSI", "ATR"]
    logging:
      format: "json"
      destination: "mysql"
      notify: "slack"

  # ── Altair Bot ─ sentiment_nlp ────────────────────────────────────────────
  Altair_Bot:
    name: "Altair_Bot"
    domain: "News Trading"
    algorithm:
      type: "sentiment_nlp"
      parameters:
        objective: "classification"
        eval_metric: "auc"
        loss_function: "cross_entropy"
        indicator_window: 14
        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
        constraints:
          leverage_limit: 2.0
          sector_weights: "balanced"
      hyperparameters:
        learning_rate: [0.0001, 0.01]
        batch_size: [32, 256]
        epochs: [50, 500]
        dropout_rate: [0.1, 0.5]
        max_seq_length: [64, 512]
        num_attention_heads: [2, 16]
    risk_management:
      stop_loss: "2_ATR"
      take_profit: "4_ATR"
      risk_per_trade: "1%"
      position_sizing: "volatility_based"
    data_sources:
      market_data: "broker_api"
      sentiment_feed: "news_api"
      indicators: ["RSI", "MACD", "ATR"]
    logging:
      format: "json"
      destination: "mysql"
      notify: "slack"

  # ── Hydra Bot ─ neural_network ────────────────────────────────────────────
  Hydra_Bot:
    name: "Hydra_Bot"
    domain: "Healthcare Momentum"
    algorithm:
      type: "neural_network"
      parameters:
        architecture: "Dense_Momentum"
        objective: "classification"
        eval_metric: "auc"
        loss_function: "cross_entropy"
        indicator_window: 14
        thresholds:
          rsi_overbought: 70
          rsi_oversold: 30
        constraints:
          leverage_limit: 1.5
          sector_weights: "health_overweight"
      hyperparameters:
        hidden_layers: [2, 5]
        neurons_per_layer: [64, 512]
        activation: ["relu", "tanh"]
        optimizer: ["Adam", "RMSprop"]
        learning_rate: [0.0001, 0.01]
        batch_size: [32, 256]
        epochs: [50, 500]
        dropout_rate: [0.1, 0.5]
        weight_decay: [0.0, 0.01]
        momentum_lookback: [5, 30]
    risk_management:
      stop_loss: "2_ATR"
      take_profit: "4_ATR"
      risk_per_trade: "1%"
      position_sizing: "volatility_based"
    data_sources:
      market_data: "broker_api"
      sentiment_feed: "finbert"
      indicators: ["RSI", "MACD", "ATR", "VWAP"]
    logging:
      format: "json"
      destination: "mysql"
      notify: "slack"

  # ── Dogon Bot ─ xgboost ───────────────────────────────────────────────────
  Dogon_Bot:
    name: "Dogon_Bot"
    domain: "ETF Portfolio Optimizer"
    algorithm:
      type: "xgboost"
      parameters:
        objective: "regression"
        eval_metric: "rmse"
        booster: "gbtree"
